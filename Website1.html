<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch The Box Game</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

h1 {
    margin-top: 20px;
}

#gameArea {
    width: 90%;
    height: 400px;
    margin: 30px auto;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
}

#box {
    width: 60px;
    height: 60px;
    background: #ff6b6b;
    position: absolute;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.2s;
}

#box:active {
    transform: scale(0.8);
    background: #00c9a7;
}

.stats {
    font-size: 20px;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #00c9a7;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin: 10px;
}

button:hover {
    background: #02a88a;
}

select {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* ✨ Footer Glow */
.footer {
    width: 90%;
    margin: 20px auto;
    padding: 15px;
    border-radius: 20px;
    background: linear-gradient(90deg, #ff6b6b, #ffd166);
    color: #222;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(255,255,255,0.4);
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 10px #ffd166; }
    to { box-shadow: 0 0 25px #ff6b6b; }
}
</style>
</head>

<body>

<h1>🎯 Catch The Box</h1>

<div class="stats">
    Score: <span id="score">0</span> |
    High Score: <span id="highScore">0</span> |
    Time: <span id="time">20</span>s
</div>

<!-- Difficulty -->
<div>
    Difficulty:
    <select id="difficulty">
        <option value="800">Easy</option>
        <option value="500">Medium</option>
        <option value="300">Hard</option>
    </select>
</div>

<div id="gameArea">
    <div id="box"></div>
</div>

<button onclick="startGame()">Start Game</button>

<!-- 🔊 Sound -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
let score = 0;
let highScore = 0;
let timeLeft = 20;
let gameInterval;
let timerInterval;

const box = document.getElementById("box");
const gameArea = document.getElementById("gameArea");
const sound = document.getElementById("clickSound");

function moveBox() {
    const maxX = gameArea.clientWidth - box.clientWidth;
    const maxY = gameArea.clientHeight - box.clientHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    box.style.left = x + "px";
    box.style.top = y + "px";
}

box.addEventListener("click", () => {
    score++;
    document.getElementById("score").innerText = score;

    sound.play(); // 🔊 sound effect
    moveBox();
});

function startGame() {
    score = 0;
    timeLeft = 20;

    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = timeLeft;

    let speed = document.getElementById("difficulty").value;

    moveBox();

    clearInterval(gameInterval);
    clearInterval(timerInterval);

    gameInterval = setInterval(moveBox, speed);

    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(gameInterval);
            clearInterval(timerInterval);

            if (score > highScore) {
                highScore = score;
                document.getElementById("highScore").innerText = highScore;
            }

            alert("🎮 Game Over!\nYour Score: " + score);
        }
    }, 1000);
}
</script>

<!-- ✨ Eye-catching Footer -->
<div class="footer">
    © Radhamita  | Catch The Box Game  | Keep Clicking & Win! 
</div>

</body>
</html>
